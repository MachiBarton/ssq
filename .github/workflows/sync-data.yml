name: Sync Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync datasets
        run: npm run sync:data

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/lotto-history.json public/data/lotto-recommendation.json src/generated/lotto-history.json src/generated/lotto-recommendation.json
          git diff --cached --quiet || git commit -m "chore: sync lottery datasets"
          git push
